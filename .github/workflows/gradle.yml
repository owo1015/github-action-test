name: Java CI/CD with Gradle & Docker

# 1. main에 코드 push or PR 생성
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. GitHub Actions 실행
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    # 3. 코드 checkout
    - uses: actions/checkout@v4

    # 4. JDK 21 설치
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 5. Gradle 세팅
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

    # 6. ./gradlew build 실행
    - name: Build with Gradle Wrapper
      run: ./gradlew build

    # 7. Docker Hub 인증
    - name: Docker Hub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 8. Docker 이미지 빌드 후 Docker Hub에 푸시
    - name: Build & Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/github-action-test:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    # 9. Canary 배포
    - name: Canary Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          STABLE_PORT=8081
          CANARY_PORT=8082
          IMAGE=${{ secrets.DOCKER_USERNAME }}/github-action-test:latest

          # 새 이미지 pull
          docker pull ${{ secrets.DOCKER_USERNAME }}/github-action-test:latest

          # canary가 존재하면 stable로 승격 후 새 canary 배포
          if docker ps -a --format '{{.Names}}' | grep -q canary; then
            CANARY_IMAGE_ID=$(docker inspect --format='{{.Image}}' canary)
            docker stop stable || true
            docker rm stable || true
            docker stop canary || true
            docker rm canary || true
            docker run -d --name stable -p $STABLE_PORT:8080 $CANARY_IMAGE_ID
          fi

          # 새 canary 컨테이너 실행
          docker stop canary || true
          docker rm canary || true
          docker run -d --name canary -p $CANARY_PORT:8080 $IMAGE

          # 헬스 체크 (최대 30초 대기)
          for i in $(seq 1 10); do
            if curl -s http://localhost:$CANARY_PORT/health | grep -q UP; then
              echo "Health check passed"
              break
            fi
            echo "Waiting... ($i)"
            sleep 3
          done

          # Nginx 카나리 설정 (stable 90%, canary 10%)
          sudo tee /etc/nginx/sites-available/default > /dev/null <<EOF
          upstream app {
              server localhost:$STABLE_PORT weight=9;
              server localhost:$CANARY_PORT weight=1;
          }

          server {
              listen 80;
              location / {
                  proxy_pass http://app;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
              }
          }
          EOF
          sudo nginx -t && sudo nginx -s reload

          echo "Canary deployed on port $CANARY_PORT with 10% traffic"

name: Java CI/CD with Gradle & Docker

# 1. main에 코드 push or PR 생성
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. GitHub Actions 실행
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    # 3. 코드 checkout
    - uses: actions/checkout@v4

    # 4. JDK 21 설치
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 5. Gradle 세팅
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

    # 6. ./gradlew build 실행
    - name: Build with Gradle Wrapper
      run: ./gradlew build

    # 7. Docker Hub 인증
    - name: Docker Hub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 8. Docker 이미지 빌드 후 Docker Hub에 푸시
    - name: Build & Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/github-action-test:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    # 9. Rolling 배포
    - name: Rolling Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/github-action-test:latest
          PORTS=(8081 8082 8083)
          NAMES=(app-1 app-2 app-3)

          # 새 이미지 pull
          docker pull $IMAGE

          # 컨테이너를 하나씩 교체
          for i in 0 1 2; do
            NAME=${NAMES[$i]}
            PORT=${PORTS[$i]}

            echo "Updating $NAME on port $PORT..."

            # 기존 컨테이너 중지 및 제거
            docker stop $NAME || true
            docker rm $NAME || true

            # 새 버전으로 실행
            docker run -d --name $NAME -p $PORT:8080 $IMAGE

            # 헬스 체크 (최대 30초 대기)
            for j in $(seq 1 10); do
              if curl -s http://localhost:$PORT/health | grep -q UP; then
                echo "$NAME health check passed"
                break
              fi
              echo "Waiting for $NAME... ($j)"
              sleep 3
            done
          
            echo "$NAME updated"

            # 모든 컨테이너 /health 결과 출력
            echo "===== Health Check Results ====="
            for k in 0 1 2; do
              echo "${NAMES[$k]} (${PORTS[$k]}): $(curl -s http://localhost:${PORTS[$k]}/health)"
            done
            echo "================================"
          done

          echo "Rolling deploy complete"

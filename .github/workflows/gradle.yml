name: Java CI/CD with Gradle & Docker

# 1. main에 코드 push or PR 생성
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. GitHub Actions 실행
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    # 3. 코드 checkout
    - uses: actions/checkout@v4

    # 4. JDK 21 설치
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # 5. Gradle 세팅
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    # 6. ./gradlew build 실행
    - name: Build with Gradle Wrapper
      run: ./gradlew build

    # 7. Docker Hub 인증
    - name: Docker Hub Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 8. Docker 이미지 빌드 후 Docker Hub에 푸시
    - name: Build & Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/github-action-test:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    # 9. EC2에서 JAR 파일 배포
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/github-action-test:latest
          docker stop app || true
          docker rm app || true
          docker run -d --name app -p 8080:8080 ${{ secrets.DOCKER_USERNAME }}/github-action-test:latest

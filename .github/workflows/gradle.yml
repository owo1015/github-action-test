name: Java CI/CD with Gradle

# 1. main에 코드 push or PR 생성
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# 2. GitHub Actions 실행
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    # 3. 코드 checkout
    - uses: actions/checkout@v4

    # 4. JDK 17 설치
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 5. Gradle 세팅
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

    # 6. ./gradlew build 실행
    - name: Build with Gradle Wrapper
      run: ./gradlew build

    # 7. 빌드된 JAR 파일을 EC2로 전송
    - name: Transfer build file to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "build/libs/*.jar"
        target: ${{ secrets.EC2_TARGET_DIR }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
    # 8. EC2에서 JAR 파일 배포 (기존 프로세스 종료 후 재시작)
    - name: Deploy on EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          PID=$(pgrep -f "java -jar" || true)
          if [ -n "$PID" ]; then
            kill -15 $PID
            sleep 5
          fi
          JAR_FILE=$(ls -t ${{ secrets.EC2_TARGET_DIR }}/build/libs/*.jar | head -1)
          nohup java -jar "$JAR_FILE" > ${{ secrets.EC2_TARGET_DIR }}/app.log 2>&1 &
